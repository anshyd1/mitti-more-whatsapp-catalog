name: Install and Deploy Mitti Website

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify and install website files
        shell: bash
        run: |
          echo "cd8b25506891ed078ace2f6022d16cf222455e74ebc9c6b047162f481470be57  .github/workflows/mitti-site.tar.gz" | sha256sum --check
          tar -xzf .github/workflows/mitti-site.tar.gz -C "$GITHUB_WORKSPACE"
          test -f index.html
          test -f css/style.css
          test -f js/app.js
          rm -f .github/workflows/bootstrap-mitti-more.yml
          rm -f .github/workflows/bootstrap-mitti-small.yml
          rm -f .github/workflows/mitti-site.tar.gz

      - name: Validate JavaScript
        run: |
          node --check js/store-config.js
          node --check js/products.js
          node --check js/app.js

      - name: Commit website files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Install Mitti & More website" || true
          git push origin HEAD:main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          enablement: true

      - name: Prepare static website
        run: |
          mkdir -p "$RUNNER_TEMP/site"
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            ./ "$RUNNER_TEMP/site/"

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
