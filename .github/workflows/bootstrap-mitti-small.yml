name: Mobile UI Hotfix v3

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fix zero badges and footer overlap
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          css_file = Path("css/style.css")
          css = css_file.read_text()
          marker = "/* Mobile footer chrome hotfix v3 */"
          css_patch = r'''

          /* Mobile footer chrome hotfix v3 */
          .badge-count[hidden] { display: none !important; }

          @media (max-width: 767px) {
            .mobile-bottom-nav,
            .whatsapp-float {
              transition: transform .25s ease, opacity .2s ease;
              will-change: transform, opacity;
            }
            body.footer-in-view .mobile-bottom-nav {
              transform: translateY(calc(100% + env(safe-area-inset-bottom)));
              opacity: 0;
              pointer-events: none;
            }
            body.footer-in-view .whatsapp-float {
              transform: translateY(96px);
              opacity: 0;
              pointer-events: none;
            }
            .site-footer { padding-bottom: 44px; }
          }
          '''
          if marker not in css:
              css_file.write_text(css + css_patch)

          js_file = Path("js/app.js")
          js = js_file.read_text()
          footer_function = r'''  function setupFooterChrome() {
            const footer = document.querySelector(".site-footer");
            if (!footer) return;
            const setState = visible => document.body.classList.toggle("footer-in-view", visible);
            if ("IntersectionObserver" in window) {
              const observer = new IntersectionObserver(entries => setState(entries[0].isIntersecting), {
                root: null,
                threshold: 0,
                rootMargin: "0px 0px -24px 0px"
              });
              observer.observe(footer);
            } else {
              const check = () => {
                const rect = footer.getBoundingClientRect();
                setState(rect.top < window.innerHeight && rect.bottom > 0);
              };
              window.addEventListener("scroll", check, { passive: true });
              check();
            }
          }

          '''
          if "function setupFooterChrome()" not in js:
              needle = "  function renderGlobalSearch(term) {"
              if needle not in js:
                  raise SystemExit("Could not locate app insertion point")
              js = js.replace(needle, footer_function + needle, 1)
          if "  setupFooterChrome();" not in js:
              needle = "  updateSEO();\n})();"
              if needle not in js:
                  raise SystemExit("Could not locate app startup point")
              js = js.replace(needle, "  updateSEO();\n  setupFooterChrome();\n})();", 1)
          js_file.write_text(js)
          PY

      - name: Validate hotfix
        shell: bash
        run: |
          node --check js/app.js
          grep -q 'badge-count\[hidden\]' css/style.css
          grep -q 'function setupFooterChrome' js/app.js
          grep -q 'setupFooterChrome();' js/app.js

      - name: Commit hotfix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add css/style.css js/app.js
          if git diff --cached --quiet; then
            echo "Hotfix is already installed."
          else
            git commit -m "Fix mobile badge and footer navigation overlap"
            git push origin HEAD:main
          fi

      - name: Request Pages rebuild
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/pages/builds" || true

      - name: Summary
        run: |
          echo "## Mobile UI Hotfix v3 applied" >> "$GITHUB_STEP_SUMMARY"
          echo "- Zero-value badges are hidden" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bottom navigation hides when footer enters the screen" >> "$GITHUB_STEP_SUMMARY"
          echo "- Floating WhatsApp hides over the footer" >> "$GITHUB_STEP_SUMMARY"
          echo "- Vercel will redeploy automatically from the new commit" >> "$GITHUB_STEP_SUMMARY"
