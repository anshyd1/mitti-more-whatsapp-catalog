name: Apply Mitti Audit Fixes v2

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install audited website update
        shell: bash
        run: |
          echo "239ed75e14b8c601e937634f435a3dba48efc84a8461f62865803dcb37ce3269  .github/workflows/mitti-site.tar.gz" | sha256sum --check
          tar -xzf .github/workflows/mitti-site.tar.gz -C "$GITHUB_WORKSPACE"
          test -f index.html
          test -f css/style.css
          test -f js/app.js
          test -f assets/images/products/ceramic-coffee-mug.webp
          test -f assets/images/products/ceramic-coffee-mug-640.webp
          test -f sitemap.xml

      - name: Validate update
        shell: bash
        run: |
          node --check js/store-config.js
          node --check js/products.js
          node --check js/app.js
          grep -q 'header-wishlist' css/style.css
          grep -q 'application/ld+json' js/app.js

      - name: Commit audited website files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- \
            .gitignore \
            README.md \
            DEPLOYMENT.md \
            index.html \
            shop.html \
            product.html \
            wishlist.html \
            cart.html \
            about.html \
            contact.html \
            policies.html \
            favicon.svg \
            manifest.webmanifest \
            robots.txt \
            sitemap.xml \
            vercel.json \
            assets \
            css \
            js

          if git diff --cached --quiet; then
            echo "No website changes were required."
          else
            git commit -m "Fix mobile UI, image quality and accessibility"
            git push origin HEAD:main
          fi

      - name: Request GitHub Pages rebuild
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(curl -sS -o "$RUNNER_TEMP/pages-response.json" -w "%{http_code}" \
            -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/pages/builds")

          cat "$RUNNER_TEMP/pages-response.json" || true
          if [ "$STATUS" = "201" ] || [ "$STATUS" = "202" ]; then
            echo "GitHub Pages rebuild requested successfully."
          else
            echo "::warning::Website commit succeeded. Pages returned HTTP $STATUS; branch deployment may still start automatically."
          fi

      - name: Update summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ## Mitti & More audit update applied

          - Mobile header overlap fixed
          - Responsive high-resolution images added
          - Product cards and touch targets aligned
          - Fixed navigation/WhatsApp overlap reduced
          - WCAG contrast issues fixed
          - Policies overflow fixed
          - Keyboard focus handling improved
          - Product structured data and sitemap added

          Live URL: https://anshyd1.github.io/mitti-more-whatsapp-catalog/
          SUMMARY
