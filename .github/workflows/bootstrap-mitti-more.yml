          MITTI_ARCHIVE
          base64 --decode "$RUNNER_TEMP/mitti-site.b64" > "$RUNNER_TEMP/mitti-site.tar.gz"
          echo "c1283e1e67e007baec46536cccd1802aae0fc36dc9968be8273d4292a4b72c9f  $RUNNER_TEMP/mitti-site.tar.gz" | sha256sum --check
          tar --extract --gzip --file "$RUNNER_TEMP/mitti-site.tar.gz" --directory "$GITHUB_WORKSPACE"
          test -f index.html
          test -f css/style.css
          test -f js/app.js
          test -f .github/workflows/deploy-pages.yml
          echo "Website files created successfully."

      - name: Validate JavaScript
        run: |
          node --check js/store-config.js
          node --check js/products.js
          node --check js/app.js

      - name: Commit generated website
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "Website is already up to date."
          else
            git commit -m "Build Mitti & More WhatsApp catalog"
            git push origin HEAD:main
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          enablement: true

      - name: Prepare deployment artifact
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/site"
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            ./ "$RUNNER_TEMP/site/"

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy website to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
